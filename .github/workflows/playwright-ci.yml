name: Playwright UI Tests

on:
  push:
  pull_request:

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-playwright.txt
          python -m playwright install

      - name: Start Streamlit app
        run: |
          nohup python -m streamlit run apps/facilitator_ui.py --server.port 8502 > streamlit.log 2>&1 & echo $! > streamlit.pid
          for i in $(seq 1 30); do
            python -c "import requests; r=requests.get('http://localhost:8502',timeout=1); exit(0 if r.status_code==200 else 1)" 2>/dev/null \
              && echo "streamlit up" && exit 0 || sleep 1
          done
          echo "Streamlit did not start" >&2 && exit 1

      - name: Run Playwright tests
        run: |
          python -m pytest tests/test_facilitator_playwright.py -q

      - name: Upload streamlit log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: streamlit-log
          path: streamlit.log
