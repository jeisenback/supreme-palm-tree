name: Playwright UI Tests

on:
  push:
  pull_request:

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-playwright.txt
          python -m playwright install

      - name: Start Streamlit app
        run: |
          nohup python -m streamlit run apps/facilitator_ui.py --server.port 8502 > streamlit.log 2>&1 & echo $! > streamlit.pid
          python - <<'PY'
import time, requests, sys
deadline=time.time()+30
url='http://localhost:8502'
while time.time()<deadline:
    try:
        r=requests.get(url, timeout=1)
        if r.status_code==200:
            print('streamlit up')
            sys.exit(0)
    except Exception:
        time.sleep(1)
print('Streamlit did not start', file=sys.stderr)
sys.exit(1)
PY

      - name: Run Playwright tests
        run: |
          python -m pytest tests/test_facilitator_playwright.py -q

      - name: Upload streamlit log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: streamlit-log
          path: streamlit.log
