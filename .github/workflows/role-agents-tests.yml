name: Role Agents Tests

on:
  push:
    paths:
      - 'agents/**'
      - 'tests/**'
      - 'examples/**'
      - '.github/workflows/role-agents-tests.yml'
  pull_request:
    paths:
      - 'agents/**'
      - 'tests/**'
      - 'examples/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run role-agent tests
        env:
          PYTHONPATH: .
        run: |
          pytest -q tests/test_cli_*.py tests/test_skills_*.py
