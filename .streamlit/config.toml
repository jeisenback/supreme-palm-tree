[server]
# Render provides $PORT — this default is used for local dev only
port = 8501
headless = true
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
serverAddress = "0.0.0.0"

[theme]
# Matches DESIGN_UI.md accent color
primaryColor = "#1E6B52"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F5F5F3"
textColor = "#1A1A2E"
font = "sans serif"
