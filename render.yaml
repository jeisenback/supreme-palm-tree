services:
  - type: web
    name: ecba-facilitator
    env: python
    region: ohio
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run apps/facilitator_ui.py --server.port $PORT --server.address 0.0.0.0
    healthCheckPath: /_stcore/health
    autoDeploy: true
    disk:
      name: facilitator-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      # Set these in the Render dashboard — do NOT commit values here
      - key: FACILITATOR_PASSWORD
        sync: false
      # Set this to your mounted Render Disk path for persistent runtime state
      - key: FACILITATOR_DATA_DIR
        value: /var/data
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
    # NOTE: Render's free tier uses an ephemeral filesystem.
    # Runtime writes (session_live.json, attendees/, notes CSV) persist only
    # when a Render Disk is mounted and FACILITATOR_DATA_DIR points to it.
