services:
  - type: web
    name: ecba-facilitator
    env: python
    region: ohio
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run apps/facilitator_ui.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      # Set these in the Render dashboard — do NOT commit values here
      - key: FACILITATOR_PASSWORD
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
    # NOTE: Render's free tier uses an ephemeral filesystem.
    # Runtime writes (session_live.json, attendees/, notes CSV) will not
    # persist across deploys or restarts. Upgrade to a paid plan and add
    # a Render Disk at /var/data if persistence is needed, then update
    # the path constants in apps/facilitator_ui.py accordingly.
